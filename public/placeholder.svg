<svg xmlns="http://www.w3.org/2000/svg" width="300" height="220" viewBox="0 0 300 220">
  <!-- Фирменный темно-графитовый фон из твоей темы CRM -->
  <rect width="100%" height="100%" fill="#1a1d24"/>
  
  <!-- Легкая инженерная сетка на фоне для B2B стиля -->
  <path d="M0 55 H300 M0 110 H300 M0 165 H300 M75 0 V220 M150 0 V220 M225 0 V220" stroke="#2c313c" stroke-width="1" opacity="0.4"/>
  
  <!-- Иконка: Контур сервера/оборудования -->
  <g transform="translate(110, 45)" stroke="#3f4452" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="0" width="80" height="65" rx="6" stroke="#2c313c" fill="#111317"/>
    <!-- Серверные полки/индикаторы -->
    <line x1="10" y1="18" x2="50" y2="18" />
    <circle cx="65" cy="18" r="2" fill="#3f4452" stroke="none"/>
    
    <line x1="10" y1="32" x2="50" y2="32" />
    <circle cx="65" cy="32" r="2" fill="#3f4452" stroke="none"/>
    
    <line x1="10" y1="46" x2="50" y2="46" stroke="#3b82f6" opacity="0.6"/>
    <circle cx="65" cy="46" r="2" fill="#3b82f6" stroke="none" opacity="0.7"/>
  </g>

  <!-- Иконка: Перечеркнутый фотоаппарат поверх сервера -->
  <g transform="translate(145, 80)">
    <circle cx="20" cy="20" r="22" fill="#1a1d24" stroke="#2c313c" stroke-width="2"/>
    <path d="M10 14 H14 L16 11 H24 L26 14 H30 C31.1 14 32 14.9 32 16 V27 C32 28.1 31.1 29 30 29 H10 C8.9 29 8 28.1 8 27 V16 C8 14.9 8.9 14 10 14 Z" fill="none" stroke="#ff4d4f" stroke-width="2" stroke-linejoin="round" opacity="0.8"/>
    <circle cx="20" cy="22" r="4" fill="none" stroke="#ff4d4f" stroke-width="2" opacity="0.8"/>
    <!-- Линия перечеркивания -->
    <line x1="5" y1="9" x2="35" y2="33" stroke="#ff4d4f" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Текст-подпись -->
  <text x="150" y="165" fill="#888888" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="0.5" text-anchor="middle">
    НЕТ ИЗОБРАЖЕНИЯ
  </text>
  <text x="150" y="183" fill="#555555" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" text-anchor="middle">
    InfraCoreCRM
  </text>
</svg>
